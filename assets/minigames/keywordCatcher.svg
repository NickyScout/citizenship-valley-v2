<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Keyword catcher sky">
  <defs>
    <linearGradient id="kcSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2c3b"/>
      <stop offset="1" stop-color="#0f181f"/>
    </linearGradient>
    <linearGradient id="kcBasket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6cf6a"/>
      <stop offset="1" stop-color="#e0a92f"/>
    </linearGradient>
  </defs>
  <rect width="360" height="120" fill="url(#kcSky)"/>
  <!-- soft stars / sparks -->
  <g fill="#446079" opacity="0.7">
    <circle cx="40" cy="22" r="1.5"/>
    <circle cx="120" cy="16" r="1.2"/>
    <circle cx="250" cy="20" r="1.4"/>
    <circle cx="320" cy="30" r="1.2"/>
  </g>
  <!-- civic building silhouettes along the base -->
  <g fill="#16222c">
    <rect x="0" y="92" width="70" height="28"/>
    <rect x="22" y="78" width="26" height="42"/>
    <polygon points="35,66 22,78 48,78"/>
    <rect x="300" y="90" width="60" height="30"/>
    <rect x="318" y="74" width="24" height="46"/>
    <rect x="327" y="60" width="6" height="14"/>
  </g>
  <!-- falling keyword tiles -->
  <g font-family="Georgia, serif" font-size="13" font-weight="700" text-anchor="middle">
    <g><rect x="64" y="30" width="74" height="26" rx="6" fill="#f6f1df" stroke="#3a2f28" stroke-width="2"/><text x="101" y="48" fill="#26313a">VOTE</text></g>
    <g><rect x="150" y="54" width="74" height="26" rx="6" fill="#f6f1df" stroke="#3a2f28" stroke-width="2"/><text x="187" y="72" fill="#26313a">RIGHTS</text></g>
    <g><rect x="238" y="36" width="74" height="26" rx="6" fill="#f6f1df" stroke="#3a2f28" stroke-width="2"/><text x="275" y="54" fill="#26313a">LAW</text></g>
  </g>
  <!-- catching basket -->
  <g>
    <rect x="150" y="96" width="84" height="20" rx="7" fill="url(#kcBasket)" stroke="#6b4f1c" stroke-width="2"/>
    <g stroke="rgba(107,79,28,.55)" stroke-width="1.4">
      <line x1="171" y1="99" x2="171" y2="113"/>
      <line x1="192" y1="99" x2="192" y2="113"/>
      <line x1="213" y1="99" x2="213" y2="113"/>
    </g>
  </g>
  <!-- title -->
  <text x="14" y="18" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#ffe9a8">KEYWORD SKY</text>
</svg>
