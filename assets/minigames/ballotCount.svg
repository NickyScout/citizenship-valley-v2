<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ballot counting table">
  <defs>
    <linearGradient id="bcBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2733"/>
      <stop offset="1" stop-color="#111922"/>
    </linearGradient>
  </defs>
  <rect width="360" height="120" fill="url(#bcBg)"/>
  <!-- table -->
  <rect y="86" width="360" height="34" fill="#6f4633"/>
  <rect y="86" width="360" height="5" fill="#8f5b3f"/>
  <!-- ballot box -->
  <g>
    <rect x="40" y="44" width="78" height="56" rx="4" fill="#466d9f" stroke="#2f4f73" stroke-width="3"/>
    <rect x="40" y="44" width="78" height="14" fill="#5da9e9"/>
    <rect x="64" y="40" width="30" height="6" rx="2" fill="#16233a"/>
    <text x="79" y="80" font-family="Georgia, serif" font-size="11" font-weight="700" text-anchor="middle" fill="#cfe6fb">VOTE</text>
    <!-- ballot going in -->
    <rect x="68" y="20" width="22" height="18" fill="#f5f0df" stroke="#cdbf9f" stroke-width="1.5" transform="rotate(-8 79 29)"/>
    <path d="M73 31 l3 3 l6 -7" transform="rotate(-8 79 29)" fill="none" stroke="#6fbf73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- tally sheet -->
  <g transform="rotate(4 230 70)">
    <rect x="180" y="40" width="100" height="60" rx="3" fill="#f5f0df" stroke="#cdbf9f" stroke-width="2"/>
    <line x1="180" y1="58" x2="280" y2="58" stroke="#9fb0bb" stroke-width="1.5"/>
    <g stroke="#26313a" stroke-width="2.5">
      <line x1="190" y1="64" x2="190" y2="76"/><line x1="196" y1="64" x2="196" y2="76"/><line x1="202" y1="64" x2="202" y2="76"/><line x1="208" y1="64" x2="208" y2="76"/><line x1="186" y1="76" x2="212" y2="64"/>
      <line x1="226" y1="64" x2="226" y2="76"/><line x1="232" y1="64" x2="232" y2="76"/><line x1="238" y1="64" x2="238" y2="76"/>
      <line x1="190" y1="84" x2="190" y2="96"/><line x1="196" y1="84" x2="196" y2="96"/>
    </g>
    <rect x="252" y="62" width="20" height="14" fill="#f2c14e"/>
  </g>
  <!-- winner star -->
  <path d="M320 30 l4 9 9 1 -7 7 2 9 -8 -5 -8 5 2 -9 -7 -7 9 -1 z" fill="#f2c14e" stroke="#b98231" stroke-width="1"/>
</svg>
