<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Rights and responsibilities scales">
  <defs>
    <linearGradient id="rmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2540"/>
      <stop offset="1" stop-color="#141022"/>
    </linearGradient>
  </defs>
  <rect width="360" height="120" fill="url(#rmBg)"/>
  <rect y="96" width="360" height="24" fill="#241c33"/>
  <!-- scale stand -->
  <rect x="176" y="30" width="8" height="74" fill="#caa64a"/>
  <rect x="150" y="100" width="60" height="10" rx="3" fill="#caa64a"/>
  <circle cx="180" cy="30" r="7" fill="#f2c14e"/>
  <rect x="96" y="30" width="168" height="6" rx="3" fill="#f2c14e"/>
  <!-- left pan: rights (blue) -->
  <g>
    <line x1="104" y1="33" x2="92" y2="60" stroke="#cdbf9f" stroke-width="2"/>
    <line x1="104" y1="33" x2="124" y2="60" stroke="#cdbf9f" stroke-width="2"/>
    <path d="M86 60 h44 a22 14 0 0 1 -44 0 z" fill="#466d9f" stroke="#5da9e9" stroke-width="2"/>
    <text x="108" y="54" font-family="Georgia, serif" font-size="11" font-weight="700" text-anchor="middle" fill="#cfe6fb">RIGHTS</text>
  </g>
  <!-- right pan: responsibilities (green) -->
  <g>
    <line x1="256" y1="33" x2="236" y2="62" stroke="#cdbf9f" stroke-width="2"/>
    <line x1="256" y1="33" x2="276" y2="62" stroke="#cdbf9f" stroke-width="2"/>
    <path d="M230 62 h52 a26 15 0 0 1 -52 0 z" fill="#2f6a39" stroke="#6fbf73" stroke-width="2"/>
    <text x="256" y="57" font-family="Georgia, serif" font-size="8.5" font-weight="700" text-anchor="middle" fill="#d7f0d9">DUTIES</text>
  </g>
  <!-- small civic figures -->
  <circle cx="40" cy="74" r="9" fill="#e0a458"/>
  <rect x="31" y="84" width="18" height="22" rx="5" fill="#5da9e9"/>
  <circle cx="324" cy="74" r="9" fill="#d8a079"/>
  <rect x="315" y="84" width="18" height="22" rx="5" fill="#6fbf73"/>
</svg>
