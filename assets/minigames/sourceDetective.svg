<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Source detective desk">
  <defs>
    <linearGradient id="sdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2733"/>
      <stop offset="1" stop-color="#10171d"/>
    </linearGradient>
  </defs>
  <rect width="360" height="120" fill="url(#sdBg)"/>
  <rect y="92" width="360" height="28" fill="#26201c"/>
  <rect y="92" width="360" height="4" fill="#3a2f28"/>
  <!-- newspaper -->
  <g transform="rotate(-6 120 60)">
    <rect x="60" y="26" width="120" height="74" rx="3" fill="#f5f0df" stroke="#cdbf9f" stroke-width="2"/>
    <rect x="68" y="33" width="104" height="13" fill="#26313a"/>
    <text x="120" y="43" font-family="Georgia, serif" font-size="9" font-weight="700" text-anchor="middle" fill="#f5f0df">DAILY CIVIC</text>
    <rect x="68" y="52" width="48" height="34" fill="#c7d4dc"/>
    <rect x="72" y="56" width="40" height="3" fill="#8aa0ab"/>
    <rect x="72" y="62" width="40" height="3" fill="#8aa0ab"/>
    <rect x="72" y="68" width="32" height="3" fill="#8aa0ab"/>
    <rect x="122" y="52" width="50" height="3" fill="#7c8a92"/>
    <rect x="122" y="58" width="50" height="3" fill="#7c8a92"/>
    <rect x="122" y="64" width="50" height="3" fill="#7c8a92"/>
    <rect x="122" y="70" width="40" height="3" fill="#7c8a92"/>
    <rect x="122" y="76" width="50" height="3" fill="#7c8a92"/>
  </g>
  <!-- reliable stamp -->
  <g transform="rotate(-12 250 44)">
    <circle cx="250" cy="44" r="24" fill="none" stroke="#6fbf73" stroke-width="4"/>
    <path d="M239 45 l7 8 l16 -18" fill="none" stroke="#6fbf73" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- unreliable stamp -->
  <g transform="rotate(10 305 78)">
    <circle cx="305" cy="78" r="20" fill="none" stroke="#e36b5d" stroke-width="4"/>
    <path d="M296 69 l18 18 M314 69 l-18 18" stroke="#e36b5d" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- magnifier -->
  <g transform="rotate(18 196 74)">
    <circle cx="196" cy="74" r="22" fill="rgba(150,200,235,.22)" stroke="#cdd6da" stroke-width="5"/>
    <circle cx="196" cy="74" r="13" fill="none" stroke="#9fb2bd" stroke-width="2"/>
    <rect x="212" y="90" width="26" height="9" rx="4" transform="rotate(40 212 90)" fill="#b98231"/>
  </g>
</svg>
