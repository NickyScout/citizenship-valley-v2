<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 160" role="img" aria-labelledby="title desc">
  <title id="title">Apathy Shade silhouette</title>
  <desc id="desc">A dark abstract figure with red eyes and ragged lower edges.</desc>
  <defs>
    <linearGradient id="shadeBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#263036"/>
      <stop offset="0.52" stop-color="#12191c"/>
      <stop offset="1" stop-color="#070b0d"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M48 4 C67 16 80 36 83 60 L94 154 L72 140 L58 158 L48 146 L37 158 L24 140 L2 154 L13 60 C16 36 29 16 48 4 Z" fill="url(#shadeBody)" stroke="#4d5a59" stroke-opacity="0.5" stroke-width="3" filter="url(#softGlow)"/>
  <path d="M26 88 C35 99 42 105 48 105 C55 105 62 99 70 88" fill="none" stroke="#4d5a59" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
  <rect x="30" y="55" width="10" height="9" rx="2" fill="#e36b5d"/>
  <rect x="56" y="55" width="10" height="9" rx="2" fill="#e36b5d"/>
  <path d="M26 70 H70" stroke="#101619" stroke-width="5" stroke-linecap="round"/>
</svg>